syntax = "proto3";

package pp.multidir;

enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_ACTIVE = 1;
  STATUS_INACTIVE = 2;
  STATUS_DELETED = 3;
}

message Shared {
  string x = 1;
  int32 id = 2;
  Status status = 3;
  repeated string labels = 4;
  Detail detail = 5;

  message Detail {
    string description = 1;
    int64 created_at = 2;
  }
}

message Timestamp {
  int64 seconds = 1;
  int32 nanos = 2;
}

message Pagination {
  int32 page = 1;
  int32 page_size = 2;
  string cursor = 3;
}
